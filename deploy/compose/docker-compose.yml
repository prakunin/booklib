services:
  # Upgrade path from Booklore:
  # Keep your existing service name, container_name, database names/users, and ports.
  # Replace the image line(s) with BookLib tags.
  #
  # The mariadb volume is the exception: BookLib now runs the official mariadb
  # image, whose datadir is /var/lib/mysql rather than the linuxserver /config.
  # Keeping your old volume mapping here will start an EMPTY database.
  # Read docs/UPGRADING-MARIADB-12.md before upgrading.
  booklib:
    # Stable release example:
    image: prakunin/booklib:v0.38.2
    # Convenience tag:
    # image: prakunin/booklib:latest
    # Or the GHCR image:
    # image: ghcr.io/prakunin/booklib:v0.38.2
    # The image already embeds its own release version metadata.
    container_name: booklib
    # The JVM uses -XX:MaxRAMPercentage=60.0, so this container limit yields
    # roughly a 1.2 GB max heap. Without a memory limit, Java sizes the heap
    # against host RAM instead of a BookLib-specific budget.
    mem_limit: 2g
    environment:
      - USER_ID=1000
      - GROUP_ID=1000
      - TZ=Etc/UTC
      - DATABASE_URL=jdbc:mariadb://mariadb:3306/booklib
      - DATABASE_USERNAME=booklib
      - DATABASE_PASSWORD=your_secure_password
      - SWAGGER_ENABLED=false
      - FORCE_DISABLE_OIDC=false
      # ALLOWED_ORIGINS=
      # Optional hard heap override. If set, keep it below mem_limit so native
      # memory, threads, and file buffers still have headroom.
      # JAVA_TOOL_OPTIONS=-Xmx1g
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "6060:6060"
    volumes:
      - ./data:/app/data
      - ./books:/books
      - ./bookdrop:/bookdrop
    # Uncomment the block below if you need to override the defaults:
    #healthcheck:
    #  test: wget -q --spider http://localhost:6060/api/v1/healthcheck
    #  interval: 60s
    #  retries: 5
    #  start_period: 60s
    #  timeout: 10s
    #
    # Uncomment the block below if you want to disable healthchecks:
    #healthcheck:
    #  disable: true
    restart: unless-stopped

  mariadb:
    image: mariadb:12.3.2
    environment:
      - TZ=Etc/UTC
      - MYSQL_ROOT_PASSWORD=super_secure_password
      - MYSQL_DATABASE=booklib
      - MYSQL_USER=booklib
      - MYSQL_PASSWORD=your_secure_password
    volumes:
      - ./mariadb/data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      # The image's own probe. A bare `ping` also answers during the entrypoint's
      # init phase, which would release dependants before the database exists.
      test: [ "CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized" ]
      interval: 5s
      timeout: 5s
      retries: 10
      # Generous: first boot initialises the datadir, and an in-place upgrade
      # (MARIADB_AUTO_UPGRADE=1) runs mariadb-upgrade before the server answers.
      start_period: 120s
