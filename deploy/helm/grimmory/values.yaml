# Default values for grimmory.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

mariadb:
  enabled: true
  image:
    # Pinned here rather than inherited from the subchart's appVersion, so that
    # bumping the chart cannot change the database engine on its own.
    tag: 12.3.2
  auth:
    database: grimmory
    username: grimmory
    # existingSecret: mariadb-credentials
    # secretKeys:
    #   rootPasswordKey: mariadb-root-password
    #   userPasswordKey: mariadb-password
  service:
    port: 3306

# Mutually exclusive with the bundled mariadb subchart above.
# Set mariadb.enabled to false and externalDatabase.enabled to true to use this.
externalDatabase:
  enabled: false

  ## Database host
  host: ""

  ## Database port
  port: 3306

  ## Database user
  username: grimmory

  ## Database password
  password: ""

  ## Database name
  database: grimmory

  ## Use an existing secret
  existingSecret:
    enabled: false
    # secretName: nameofsecret
    # usernameKey: db-username
    # passwordKey: db-password
    # hostnameKey: db-hostname
    # portKey: db-port
    # databaseKey: db-name

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: grimmory/grimmory
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""
# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""
# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}
podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 6060
# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
resources: {}
# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

# This is to setup the startup, liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
startupProbe:
  httpGet:
    path: /api/v1/healthcheck
    port: http
  failureThreshold: 5
  periodSeconds: 30
  timeoutSeconds: 5
livenessProbe:
  httpGet:
    path: /api/v1/healthcheck
    port: http
  failureThreshold: 5
  periodSeconds: 10
  timeoutSeconds: 5
readinessProbe:
  httpGet:
    path: /api/v1/healthcheck
    port: http
  failureThreshold: 5
  periodSeconds: 10
  timeoutSeconds: 5
# If you want to bring your own persistence (such as a hostPath),
# disable these and do so in extraVolumes/extraVolumeMounts
persistence:
  dataVolume:
    enabled: true
    size: 100Mi
    existingClaim: ""
  booksVolume:
    enabled: true
    size: 10Gi
    existingClaim: ""
# Additional environment variables for the application container.
# Example:
# extraEnv:
#   - name: USER_ID
#     value: "1000"
#   - name: GROUP_ID
#     value: "1000"
#   - name: APP_USER
#     value: "booklore"
extraEnv: []
extraVolumes: []
extraVolumeMounts: []

initContainer:
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 32Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Additional items that need to be installed next to the application, e.g.
# extraObjects:
# - apiVersion: k8s.mariadb.com/v1alpha1
#   kind: MariaDB
#   metadata:
#     name: grimmory-mariadb
#     namespace: grimmory
#   spec:
#     rootPasswordSecretKeyRef:
#       name: grimmory-mariadb-root
#       key: password
extraObjects: []
