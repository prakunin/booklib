apiVersion: v2
name: booklib
description: A Helm chart for [BookLib](https://github.com/prakunin/booklib)
type: application
version: 0.1.0

# The app version is set to v0.0.0 in the Github repository and is bumped
# dynamically by the CI on release
appVersion: "v0.0.0"
dependencies:
  - name: mariadb
    version: 0.16.6
    repository: oci://registry-1.docker.io/cloudpirates
    condition: mariadb.enabled
