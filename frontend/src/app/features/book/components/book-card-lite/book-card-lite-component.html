<div class="book-cover-wrapper" [class.audiobook-only]="isAudiobookOnly()" (mouseenter)="isHovered = true" (mouseleave)="isHovered = false">
  <app-cover
    class="book-cover"
    [src]="getThumbnailUrl()"
    [title]="book.metadata?.title || book.fileName"
    [authors]="book.metadata?.authors ?? []"
    [alt]="book.metadata?.title || book.fileName || ''"
    size="sm" />
    
  @if (showSeriesNumber && !book.seriesCount && book.metadata?.seriesNumber !== null && book.metadata?.seriesNumber !== undefined) {
    <div class="series-number-overlay">
      #{{ book.metadata?.seriesNumber }}
    </div>
  }

  @if (!this.isActive) {
    <p-button
      icon="pi pi-info"
      class="info-btn"
      [rounded]="true"
      [pTooltip]="book.metadata?.title"
      tooltipPosition="top"
      [ngClass]="{ 'is-visible': isHovered }"
      (onClick)="openBookInfo(book)">
    </p-button>
  }
</div>
