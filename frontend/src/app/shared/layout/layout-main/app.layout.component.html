<ng-container *transloco="let t; prefix: 'layout'">
<div class="layout-wrapper" [ngClass]="containerClass()" [style.--sidebar-stored-width]="storedSidebarWidth()">
  <app-mobile-topbar></app-mobile-topbar>
  <nav
    class="layout-sidebar"
    [attr.aria-label]="t('menu.primaryNav')"
    [attr.aria-hidden]="sidebarHidden() ? 'true' : null"
    [attr.inert]="sidebarHidden() ? '' : null"
    [cdkTrapFocus]="layoutService.mobileDrawerOpen()"
  >
    <app-sidebar></app-sidebar>
    <div
      class="layout-sidebar-resize-handle"
      tabindex="0"
      role="slider"
      [attr.aria-label]="t('menu.resizeSidebar')"
      [attr.aria-valuemin]="sidebarMinWidth"
      [attr.aria-valuemax]="sidebarMaxWidth"
      [attr.aria-valuenow]="layoutService.sidebarWidth()"
      aria-orientation="horizontal"
      (mousedown)="startResize($event)"
      (keydown)="onResizeKeydown($event)"
      (keyup)="onResizeKeyup($event)"
    ></div>
  </nav>
  <main class="layout-main">
    <router-outlet></router-outlet>
  </main>
  <button type="button" class="layout-mask" [attr.aria-label]="t('closeNavigation')" (click)="closeMobileSidebar()"></button>
</div>
</ng-container>
