name: Preview - Build Image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to preview build'
        required: true
        type: string
      pr_number:
        description: 'Optional PR number for a pr-<number>-<sha> tag'
        required: false
        default: ''
        type: string
      refresh_shared_cache:
        description: 'Rebuild from scratch and refresh the shared image cache'
        required: false
        default: false
        type: boolean

jobs:
  build-and-push:
    name: Build and Push Preview Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          ref: ${{ inputs.ref }}

      - name: Generate Preview Tag
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          short_sha=$(git rev-parse --short HEAD)

          if [ -n "$PR_NUMBER" ]; then
            case "$PR_NUMBER" in
              (*[!0-9]*)
                echo "Invalid PR number: $PR_NUMBER"
                exit 1
                ;;
            esac
            preview_tag="pr-${PR_NUMBER}-${short_sha}"
          else
            preview_tag="preview-${short_sha}"
          fi

          echo "preview_tag=$preview_tag" >> "$GITHUB_ENV"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "Preview tag: $preview_tag"

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Preview image
        if: ${{ !inputs.refresh_shared_cache }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/grimmory-tools/grimmory:${{ env.preview_tag }}
          build-args: |
            APP_VERSION=${{ env.preview_tag }}
            APP_REVISION=${{ env.commit_sha }}
          cache-from: |
            type=gha,scope=image-shared
            type=registry,ref=ghcr.io/grimmory-tools/grimmory:buildcache

      - name: Build and push Preview image with cache refresh
        if: ${{ inputs.refresh_shared_cache }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          no-cache: true
          tags: |
            ghcr.io/grimmory-tools/grimmory:${{ env.preview_tag }}
          build-args: |
            APP_VERSION=${{ env.preview_tag }}
            APP_REVISION=${{ env.commit_sha }}
          cache-to: |
            type=gha,scope=image-shared,mode=max
            type=registry,ref=ghcr.io/grimmory-tools/grimmory:buildcache,mode=max
