services:
  backend:
    build:
      context: .
      dockerfile_inline: |
        FROM gradle:9.5.1-jdk25-alpine
        RUN apk add --no-cache libstdc++ libgcc libarchive
        RUN ln -s /usr/lib/libarchive.so.13 /usr/lib/libarchive.so
    command: sh -c "cd /backend && ./gradlew bootRun"
    ports:
      - "${BACKEND_PORT:-6060}:6060"
      - "127.0.0.1:${REMOTE_DEBUG_PORT:-5005}:5005"
    environment:
      - DATABASE_URL=jdbc:mariadb://backend_db:3306/grimmory
      - DATABASE_USERNAME=grimmory
      - DATABASE_PASSWORD=grimmory
      - GRADLE_USER_HOME=/home/gradle/.gradle
      - XDG_CACHE_HOME=/home/gradle/.cache
      - REMOTE_DEBUG_ENABLED=true
      - ALLOWED_ORIGINS=*
      - API_DOCS_ENABLED=true
      - JAVA_TOOL_OPTIONS=-XX:+UseShenandoahGC -XX:ShenandoahGCHeuristics=compact -XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=8.0 -XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/heapdump.hprof -XX:MaxMetaspaceSize=256m -XX:ReservedCodeCacheSize=48m -Xss512k -XX:CICompilerCount=2 -XX:+UnlockExperimentalVMOptions -XX:+UseStringDeduplication -XX:ShenandoahUncommitDelay=5000 -XX:ShenandoahGuaranteedGCInterval=30000 -XX:MaxDirectMemorySize=256m --enable-native-access=ALL-UNNAMED --enable-preview
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      - backend_db
    volumes:
      - './backend:/backend'
      - backend_build:/backend/build
      - backend_gradle_cache:/home/gradle/.gradle
      - backend_native_cache:/home/gradle/.cache
      - ./shared/data:/app/data
      - ./shared/books:/books
      - ./shared/bookdrop:/bookdrop
  frontend:
    image: node:24-alpine
    command: |-
      sh -c "\
      cd /workspace &&\
      npm install -g pnpm@11.3.0 &&\
      pnpm config set store-dir /workspace/node_modules/.pnpm-store &&\
      pnpm install --frozen-lockfile &&\
      pnpm -C frontend exec ng serve --host 0.0.0.0 --watch --configuration development"
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
    restart: unless-stopped
    volumes:
      - '.:/workspace'
      - frontend_workspace_node_modules:/workspace/node_modules
      - frontend_node_modules:/workspace/frontend/node_modules
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
  backend_db:
    image: mariadb:11.4
    volumes:
      - backend_db:/var/lib/mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=grimmory
      - MYSQL_DATABASE=grimmory
      - MYSQL_USER=grimmory
      - MYSQL_PASSWORD=grimmory
    ports:
      - "${DB_PORT:-3366}:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-pgrimmory"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  frontend_workspace_node_modules:
  frontend_node_modules:
  backend_db:
  backend_build:
  backend_gradle_cache:
  backend_native_cache:
